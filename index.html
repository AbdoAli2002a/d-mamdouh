<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ادوات الذكاء الاصطناعي </title>
    <!-- Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Local assets -->
    <link rel="stylesheet" href="styles.css">
    <script src="data.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- DATA PERSISTENCE LAYER ---
        const loadTools = () => {
            const stored = localStorage.getItem('AI_TOOLS');
            return stored ? JSON.parse(stored) : INITIAL_AI_TOOLS;
        };

        const saveTools = (tools) => {
            localStorage.setItem('AI_TOOLS', JSON.stringify(tools));
        };

        const loadQuiz = () => {
            const stored = localStorage.getItem('QUIZ_QUESTIONS');
            return stored ? JSON.parse(stored) : INITIAL_QUIZ_QUESTIONS;
        };

        const saveQuiz = (questions) => {
            localStorage.setItem('QUIZ_QUESTIONS', JSON.stringify(questions));
        };

        // Tutorials persistence using IndexedDB (videos/files)
        const openTutorialsDB = () => {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    console.warn('IndexedDB غير مدعوم في هذا المتصفح.');
                    reject(new Error('IndexedDB not supported'));
                    return;
                }
                const request = indexedDB.open('AI_TUTORIALS_DB', 1);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('tutorials')) {
                        db.createObjectStore('tutorials', { keyPath: 'id', autoIncrement: true });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const getAllTutorialsFromDB = async () => {
            try {
                const db = await openTutorialsDB();
                return await new Promise((resolve, reject) => {
                    const tx = db.transaction('tutorials', 'readonly');
                    const store = tx.objectStore('tutorials');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = () => reject(request.error);
                });
            } catch (e) {
                console.error('Error loading tutorials:', e);
                return [];
            }
        };

        const addTutorialFileToDB = async ({ title, description, file }) => {
            const db = await openTutorialsDB();
            return await new Promise((resolve, reject) => {
                const tx = db.transaction('tutorials', 'readwrite');
                const store = tx.objectStore('tutorials');
                const fileType = file.type || 'application/octet-stream';
                const record = {
                    title,
                    description,
                    fileName: file.name,
                    fileType,
                    size: file.size,
                    createdAt: new Date().toISOString(),
                    type: fileType.startsWith('video/') ? 'video' : 'file',
                    blob: file
                };
                const request = store.add(record);
                request.onsuccess = (evt) => {
                    record.id = evt.target.result;
                    resolve(record);
                };
                request.onerror = () => reject(request.error);
            });
        };

        const deleteTutorialFromDB = async (id) => {
            const db = await openTutorialsDB();
            return await new Promise((resolve, reject) => {
                const tx = db.transaction('tutorials', 'readwrite');
                const store = tx.objectStore('tutorials');
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        };


        // --- COMPONENTS ---

        const Navbar = ({ currentPage, setPage, isAdmin, setAdmin, theme, setTheme }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const goToPage = (page) => {
                setPage(page);
                setIsMobileMenuOpen(false);
            };

            React.useEffect(() => {
                setIsMobileMenuOpen(false);
            }, [currentPage]);

            return (
                <nav className="navbar">
                    <div className="container nav-content">
                        <a className="logo" onClick={() => goToPage('home')}>
                        <i className="fa-solid fa-brain" style={{ color: 'var(--accent)' }}></i> تطبيقات الذكاء الاصطناعي
                        </a>
                        <div className="nav-links desktop-nav">
                            <button className={`nav-link ${currentPage === 'home' ? 'active' : ''}`} onClick={() => goToPage('home')}>الرئيسية</button>
                            <button className={`nav-link ${currentPage === 'types' ? 'active' : ''}`} onClick={() => goToPage('types')}>أنواع الذكاء الاصطناعي</button>
                            <button className={`nav-link ${currentPage === 'environments' ? 'active' : ''}`} onClick={() => goToPage('environments')}>البيئات التعليمية</button>
                            <button className={`nav-link ${currentPage === 'tools' ? 'active' : ''}`} onClick={() => goToPage('tools')}>الأدوات والتطبيقات</button>
                            <button className={`nav-link ${currentPage === 'tutorials' ? 'active' : ''}`} onClick={() => goToPage('tutorials')}>الدروس والملفات</button>
                            <button className={`nav-link ${currentPage === 'quiz' ? 'active' : ''}`} onClick={() => goToPage('quiz')}>اختبر معلوماتك</button>
                            <button className={`nav-link ${currentPage === 'activities' ? 'active' : ''}`} onClick={() => goToPage('activities')}>أنشطة تفاعلية</button>
                            <button className={`nav-link ${currentPage === 'chatbot' ? 'active' : ''}`} onClick={() => goToPage('chatbot')} style={{ color: 'var(--primary)' }}>
                                المساعد الذكي <i className="fa-solid fa-robot"></i>
                            </button>

                            <button
                                className="icon-btn"
                                aria-label={theme === 'dark' ? 'تفعيل الوضع الفاتح' : 'تفعيل الوضع الداكن'}
                                onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                            >
                                <i className={`fa-solid ${theme === 'dark' ? 'fa-sun' : 'fa-moon'}`}></i>
                            </button>

                            {isAdmin ? (
                                <button className="btn btn-danger btn-sm" onClick={() => { setAdmin(false); goToPage('home'); }}>
                                    تسجيل الخروج <i className="fa-solid fa-right-from-bracket"></i>
                                </button>
                            ) : (
                                <button className="btn btn-outline btn-sm" onClick={() => goToPage('login')} style={{ fontSize: '0.9rem', padding: '0.4rem 0.8rem' }}>
                                    تسجيل دخول كمسؤول النظام <i className="fa-solid fa-user-shield"></i>
                                </button>
                            )}
                        </div>

                        <button
                            className="mobile-menu-toggle"
                            aria-label={isMobileMenuOpen ? 'إغلاق القائمة' : 'فتح القائمة'}
                            onClick={() => setIsMobileMenuOpen(v => !v)}
                        >
                            <i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'}`}></i>
                        </button>
                    </div>
                    {isMobileMenuOpen && (
                        <div className="container mobile-nav-panel">
                            <button className={`nav-link ${currentPage === 'home' ? 'active' : ''}`} onClick={() => goToPage('home')}>الرئيسية</button>
                            <button className={`nav-link ${currentPage === 'types' ? 'active' : ''}`} onClick={() => goToPage('types')}>أنواع الذكاء الاصطناعي</button>
                            <button className={`nav-link ${currentPage === 'environments' ? 'active' : ''}`} onClick={() => goToPage('environments')}>البيئات التعليمية</button>
                            <button className={`nav-link ${currentPage === 'tools' ? 'active' : ''}`} onClick={() => goToPage('tools')}>الأدوات والتطبيقات</button>
                            <button className={`nav-link ${currentPage === 'tutorials' ? 'active' : ''}`} onClick={() => goToPage('tutorials')}>الدروس والملفات</button>
                            <button className={`nav-link ${currentPage === 'quiz' ? 'active' : ''}`} onClick={() => goToPage('quiz')}>اختبر معلوماتك</button>
                            <button className={`nav-link ${currentPage === 'activities' ? 'active' : ''}`} onClick={() => goToPage('activities')}>أنشطة تفاعلية</button>
                            <button className={`nav-link ${currentPage === 'chatbot' ? 'active' : ''}`} onClick={() => goToPage('chatbot')}>المساعد الذكي</button>
                            <button
                                className="icon-btn"
                                aria-label={theme === 'dark' ? 'تفعيل الوضع الفاتح' : 'تفعيل الوضع الداكن'}
                                onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                            >
                                <i className={`fa-solid ${theme === 'dark' ? 'fa-sun' : 'fa-moon'}`}></i>
                            </button>
                            {isAdmin ? (
                                <button className="btn btn-danger btn-sm" onClick={() => { setAdmin(false); goToPage('home'); }}>
                                    تسجيل الخروج <i className="fa-solid fa-right-from-bracket"></i>
                                </button>
                            ) : (
                                <button className="btn btn-outline btn-sm" onClick={() => goToPage('login')}>
                                    تسجيل دخول كمسؤول النظام <i className="fa-solid fa-user-shield"></i>
                                </button>
                            )}
                        </div>
                    )}
                </nav>
            );
        };

        // --- PUBLIC PAGES ---
        const Home = () => (
            <div>
                <header className="hero">
                    <div className="container hero-content">
                        <span className="hero-subtitle">أ.د/ممدوح عبدالحميد    </span>
                        <h1>{CONTENT.home.title}</h1>
                        <p>{CONTENT.home.intro}</p>
                        <button className="btn btn-primary" onClick={() => window.scrollTo({ top: document.getElementById('origins').offsetTop, behavior: 'smooth' })}>اكتشف البدايات</button>
                    </div>
                </header>

                <section id="origins" className="section">
                    <div className="container glass-panel">
                        <h2>أصول الذكاء الاصطناعي</h2>
                        <p>{CONTENT.home.origins}</p>
                    </div>
                </section>

                <section className="section container grid-2">
                    <div className="glass-panel">
                        <span className="badge">المميزات</span>
                        <h2>إيجابيات الذكاء الاصطناعي</h2>
                        <ul className="feature-list">
                            {CONTENT.home.pros.map((p, i) => <li key={i}>{p}</li>)}
                        </ul>
                    </div>
                    <div className="glass-panel">
                        <span className="badge" style={{ color: '#ff006e', background: 'rgba(255,0,110,0.1)' }}>العيوب</span>
                        <h2>سلبيات الذكاء الاصطناعي</h2>
                        <ul className="feature-list" style={{ '--accent': '#ff006e' }}>
                            {CONTENT.home.cons.map((c, i) => <li key={i}>{c}</li>)}
                        </ul>
                    </div>
                </section>

                <section className="section container">
                    <div className="glass-panel text-center">
                        <h2>التحديات المحتملة والحلول</h2>
                        <div className="grid-3" style={{ marginTop: '2rem', textAlign: 'right' }}>
                            {CONTENT.home.challenges.map((c, i) => (
                                <div key={i} className="glass-panel" style={{ boxShadow: 'none', background: 'var(--bg-dark)' }}>
                                    <h3 style={{ fontSize: '1.2rem', color: 'var(--accent)', marginBottom: '0.5rem' }}>{c.c}</h3>
                                    <p style={{ fontSize: '0.9rem' }}>{c.s}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            </div>
        );

        const Types = () => (
            <div className="container section" style={{ paddingTop: '8rem' }}>
                <div className="tools-header">
                    <span className="badge">التصنيفات</span>
                    <h1>أنواع الذكاء الاصطناعي</h1>
                    <p>تعرف على المراحل التطورية وتصنيفات الذكاء الاصطناعي المختلفة.</p>
                </div>

                <div className="grid-3" style={{ marginBottom: '5rem' }}>
                    {CONTENT.types.typesList.map((t, i) => (
                        <div key={i} className="glass-panel">
                            <i className="fa-solid fa-microchip" style={{ fontSize: '2rem', color: 'var(--primary)', marginBottom: '1rem' }}></i>
                            <h3 style={{ marginBottom: '1rem' }}>{t.name}</h3>
                            <p>{t.desc}</p>
                        </div>
                    ))}
                </div>

                <div className="tools-header">
                    <span className="badge">الروابط التقنية</span>
                    <h2>علاقة الذكاء الاصطناعي بتقنيات المستقبل</h2>
                </div>

                <div className="grid-3">
                    <div className="glass-panel">
                        <i className="fa-solid fa-network-wired" style={{ fontSize: '2rem', color: '#8338ec', marginBottom: '1rem' }}></i>
                        <h3>التعلم العميق</h3>
                        <p>{CONTENT.types.relationship.dl}</p>
                    </div>
                    <div className="glass-panel">
                        <i className="fa-solid fa-robot" style={{ fontSize: '2rem', color: '#ffbe0b', marginBottom: '1rem' }}></i>
                        <h3>الروبوتات المتطورة</h3>
                        <p>{CONTENT.types.relationship.robotics}</p>
                    </div>
                    <div className="glass-panel">
                        <i className="fa-solid fa-vr-cardboard" style={{ fontSize: '2rem', color: '#ff006e', marginBottom: '1rem' }}></i>
                        <h3>الواقع الافتراضي</h3>
                        <p>{CONTENT.types.relationship.vr}</p>
                    </div>
                </div>
            </div>
        );

        const Environments = () => (
            <div className="container section" style={{ paddingTop: '8rem' }}>
                <div className="tools-header">
                    <span className="badge">التعليم</span>
                    <h1>{CONTENT.environments.title}</h1>
                    <p>كيف يحدث الذكاء الاصطناعي ثورة في طرق التدريس والتعلم الحديثة.</p>
                </div>

                <div className="grid-2">
                    {CONTENT.environments.points.map((p, i) => (
                        <div key={i} className="glass-panel">
                            <h3 style={{ marginBottom: '1rem', color: 'var(--primary)' }}>{p.title}</h3>
                            <p>{p.text}</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const TutorialsPage = ({ tutorials }) => {
            const [urlsMap, setUrlsMap] = React.useState({});

            React.useEffect(() => {
                const newMap = {};
                tutorials.forEach(t => {
                    if (t.blob) {
                        newMap[t.id] = URL.createObjectURL(t.blob);
                    }
                });
                setUrlsMap(newMap);
                return () => {
                    Object.values(newMap).forEach(url => URL.revokeObjectURL(url));
                };
            }, [tutorials]);

            if (!tutorials || tutorials.length === 0) {
                return (
                    <div className="container section" style={{ paddingTop: '8rem' }}>
                        <div className="glass-panel text-center">
                            <h2>لا توجد دروس مرفوعة حالياً</h2>
                            <p>يمكن لمسؤول النظام رفع فيديوهات وملفات تعليمية من لوحة التحكم لتظهر هنا للطلاب.</p>
                        </div>
                    </div>
                );
            }

            const videos = tutorials.filter(t => t.type === 'video');
            const files = tutorials.filter(t => t.type !== 'video');

            return (
                <div className="container section" style={{ paddingTop: '8rem' }}>
                    <div className="tools-header">
                        <span className="badge">المحتوى التعليمي</span>
                        <h1>الدروس والملفات التعليمية</h1>
                        <p>شاهد الفيديوهات التعليمية وحمّل الملفات المساندة التي قام بإعدادها مسؤول النظام.</p>
                    </div>

                    {videos.length > 0 && (
                        <section style={{ marginBottom: '4rem' }}>
                            <h2 style={{ marginBottom: '1.5rem' }}>فيديوهات تعليمية</h2>
                            <div className="tutorials-grid">
                                {videos.map(t => (
                                    <div key={t.id} className="glass-panel tutorial-card">
                                        <div className="tutorial-header">
                                            <h3>{t.title}</h3>
                                            <span className="pill pill-video">فيديو</span>
                                        </div>
                                        {urlsMap[t.id] && (
                                            <video
                                                controls
                                                style={{ width: '100%', borderRadius: '12px', margin: '1rem 0' }}
                                            >
                                                <source src={urlsMap[t.id]} type={t.fileType || 'video/mp4'} />
                                                متصفحك لا يدعم تشغيل الفيديو.
                                            </video>
                                        )}
                                        {t.description && <p style={{ marginBottom: 0 }}>{t.description}</p>}
                                    </div>
                                ))}
                            </div>
                        </section>
                    )}

                    {files.length > 0 && (
                        <section>
                            <h2 style={{ marginBottom: '1.5rem' }}>ملفات وموارد قابلة للتحميل</h2>
                            <div className="tutorials-grid">
                                {files.map(t => (
                                    <div key={t.id} className="glass-panel tutorial-card">
                                        <div className="tutorial-header">
                                            <h3>{t.title}</h3>
                                            <span className="pill">ملف</span>
                                        </div>
                                        {t.description && <p>{t.description}</p>}
                                        {urlsMap[t.id] && (
                                            <a
                                                href={urlsMap[t.id]}
                                                download={t.fileName}
                                                className="btn btn-primary"
                                                style={{ width: '100%', textAlign: 'center', marginTop: '0.5rem' }}
                                            >
                                                تحميل الملف ({t.fileName})
                                            </a>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </section>
                    )}
                </div>
            );
        };

        const ToolsDirectory = ({ tools }) => {
            const [filter, setFilter] = React.useState('الكل');
            const [selectedTool, setSelectedTool] = React.useState(null);

            const filteredTools = filter === 'الكل' ? tools : tools.filter(t => t.category === filter);

            return (
                <div className="container section" style={{ paddingTop: '8rem' }}>
                    <div className="tools-header">
                        <h1>أفضل الأدوات والتطبيقات</h1>
                        <p>اكتشف أقوى المنصات لمضاعفة إنتاجيتك. انقر على أي أداة لعرض دليل الاستخدام والتفاصيل.</p>
                    </div>

                    <div className="category-filters">
                        <button className={`filter-btn ${filter === 'الكل' ? 'active' : ''}`} onClick={() => setFilter('الكل')}>الكل</button>
                        {CATEGORIES.map(c => (
                            <button key={c} className={`filter-btn ${filter === c ? 'active' : ''}`} onClick={() => setFilter(c)}>
                                {c}
                            </button>
                        ))}
                    </div>

                    <div className="grid-3">
                        {filteredTools.map(tool => (
                            <div key={tool.id} className="glass-panel tool-card" style={{ cursor: 'pointer' }} onClick={() => setSelectedTool(tool)}>
                                <div className="tool-header">
                                    <h3 className="tool-name">{tool.name}</h3>
                                    <span className="tool-category">{tool.category.split(' ')[0]}</span>
                                </div>
                                <div className="tool-tagline">{tool.tagline}</div>
                                <p>{tool.description}</p>
                                <button className="btn btn-outline" style={{ width: '100%', marginTop: 'auto', padding: '0.5rem', fontFamily: 'Tajawal' }}>عرض الدليل</button>
                            </div>
                        ))}
                    </div>

                    {selectedTool && (
                        <div className="modal-overlay" onClick={() => setSelectedTool(null)}>
                            <div className="modal-content glass-panel" onClick={e => e.stopPropagation()} style={{ background: 'var(--bg-darker)' }}>
                                <div className="modal-header">
                                    <div>
                                        <span className="tool-category">{selectedTool.category}</span>
                                        <h2 style={{ margin: '0.5rem 0', direction: 'ltr', display: 'inline-block' }}>{selectedTool.name}</h2>
                                        <br />
                                        <a href={selectedTool.url} target="_blank" style={{ color: 'var(--accent)', textDecoration: 'none', direction: 'ltr', display: 'inline-block' }}><i className="fa-solid fa-up-right-from-square" style={{ marginLeft: '5px' }}></i> {selectedTool.url}</a>
                                    </div>
                                    <button className="close-btn" onClick={() => setSelectedTool(null)}><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="modal-body">
                                    <h3 style={{ marginBottom: '1rem' }}>الميزات الأساسية</h3>
                                    <ul className="feature-list">
                                        {selectedTool.features.split('،').map((f, i) => <li key={i}>{f.trim()}</li>)}
                                    </ul>

                                    <h3 style={{ marginBottom: '1rem', marginTop: '2rem' }}>خطوات الاستخدام</h3>
                                    <ol className="step-list" style={{ paddingRight: '2rem' }}>
                                        {selectedTool.steps_to_use.split('\n').map((s, i) => <li key={i} style={{ marginBottom: '1rem', color: 'var(--text-muted)' }}>{s.trim()}</li>)}
                                    </ol>

                                    <div className="glass-panel" style={{ marginTop: '2rem', background: 'rgba(67, 97, 238, 0.1)', border: '1px solid rgba(67, 97, 238, 0.3)' }}>
                                        <h3 style={{ color: 'var(--primary)', marginBottom: '0.5rem' }}><i className="fa-solid fa-bolt" style={{ marginLeft: '8px' }}></i> دليل الإنتاجية السريع</h3>
                                        <p style={{ margin: 0 }}>{selectedTool.production_steps}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Quiz = ({ questions }) => {
            const [currentQ, setCurrentQ] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [showResult, setShowResult] = React.useState(false);
            const [selectedIdx, setSelectedIdx] = React.useState(null);
            const [hasAnswered, setHasAnswered] = React.useState(false);

            const handleAnswer = (option, idx) => {
                if (hasAnswered) return;
                setSelectedIdx(idx);
                setHasAnswered(true);

                if (option === questions[currentQ].answer) {
                    setScore(s => s + 1);
                }
            };

            const nextAction = () => {
                if (currentQ + 1 < questions.length) {
                    setCurrentQ(c => c + 1);
                    setSelectedIdx(null);
                    setHasAnswered(false);
                } else {
                    setShowResult(true);
                }
            };

            const reset = () => {
                setCurrentQ(0);
                setScore(0);
                setShowResult(false);
                setSelectedIdx(null);
                setHasAnswered(false);
            };

            if (questions.length === 0) {
                return <div className="container section text-center" style={{ paddingTop: '8rem' }}><h2>لا توجد أسئلة حالياً.</h2></div>;
            }

            if (showResult) {
                return (
                    <div className="container section" style={{ paddingTop: '8rem' }}>
                        <div className="quiz-container">
                            <div className="glass-panel quiz-card">
                                <h2>اكتمل الاختبار!</h2>
                                <h1 style={{ fontSize: '4rem', margin: '2rem 0', direction: 'ltr' }}>{score} / {questions.length}</h1>
                                <p>لقد أتممت اختبار أساسيات الذكاء الاصطناعي بنجاح.</p>
                                <button className="btn btn-primary" onClick={reset}>إعادة الاختبار <i className="fa-solid fa-rotate-right" style={{ marginRight: '8px' }}></i></button>
                            </div>
                        </div>
                    </div>
                );
            }

            const q = questions[currentQ];

            return (
                <div className="container section" style={{ paddingTop: '8rem' }}>
                    <div className="tools-header">
                        <span className="badge">اختبار المعرفة</span>
                        <h1>تحدي الذكاء الاصطناعي</h1>
                    </div>

                    <div className="quiz-container">
                        <div className="glass-panel quiz-card" style={{ textAlign: 'right' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '2rem' }}>
                                <span className="badge">السؤال {currentQ + 1} من {questions.length}</span>
                                <span className="badge" style={{ background: 'transparent', border: '1px solid var(--surface-border)', color: 'white' }}>النتيجة: {score}</span>
                            </div>

                            <h2 className="quiz-question">{q.question}</h2>

                            <div className="quiz-options">
                                {q.options.map((opt, i) => {
                                    let cName = "quiz-option ";
                                    if (hasAnswered) {
                                        if (opt === q.answer) cName += "correct ";
                                        else if (i === selectedIdx) cName += "wrong ";
                                    } else if (i === selectedIdx) {
                                        cName += "selected ";
                                    }

                                    return (
                                        <div key={i} className={cName} onClick={() => handleAnswer(opt, i)}>
                                            {opt}
                                        </div>
                                    )
                                })}
                            </div>

                            {hasAnswered && (
                                <div style={{ marginTop: '2rem', padding: '1rem', background: 'rgba(255,255,255,0.05)', borderRadius: '8px' }}>
                                    <p style={{ margin: 0 }}><strong>التوضيح: </strong> {q.explanation}</p>
                                    <button className="btn btn-primary" style={{ marginTop: '1rem' }} onClick={nextAction}>
                                        {currentQ + 1 === questions.length ? 'إنهاء الاختبار' : 'السؤال التالي'} <i className="fa-solid fa-arrow-left" style={{ marginRight: '8px' }}></i>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Activities = () => {
            const termsPool = ['AI', 'ML', 'NLP', 'GPU', 'DATA', 'CODE'];
            const [targetLetter, setTargetLetter] = React.useState('');
            const [choices, setChoices] = React.useState([]);
            const [reactionMessage, setReactionMessage] = React.useState('اضغط "ابدأ الجولة" ثم اختر بسرعة الاختصار الصحيح.');
            const [reactionScore, setReactionScore] = React.useState(0);

            const [memoryDeck, setMemoryDeck] = React.useState([]);
            const [openCards, setOpenCards] = React.useState([]);
            const [lockBoard, setLockBoard] = React.useState(false);
            const [matches, setMatches] = React.useState(0);
            const [moves, setMoves] = React.useState(0);
            const [memoryStatus, setMemoryStatus] = React.useState('اطابق البطاقات المتشابهة لأشهر اختصارات الذكاء الاصطناعي.');

            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            const startReactionRound = () => {
                const correct = termsPool[Math.floor(Math.random() * termsPool.length)];
                const wrongOptions = shuffle(termsPool.filter(t => t !== correct)).slice(0, 3);
                setTargetLetter(correct);
                setChoices(shuffle([correct, ...wrongOptions]));
                setReactionMessage(`ابحث عن الاختصار: ${correct}`);
            };

            const chooseReaction = (value) => {
                if (!targetLetter) return;
                if (value === targetLetter) {
                    setReactionScore(s => s + 1);
                    setReactionMessage('ممتاز! اختيار صحيح.');
                } else {
                    setReactionMessage(`محاولة جيدة. الإجابة الصحيحة كانت ${targetLetter}.`);
                }
                setTimeout(startReactionRound, 650);
            };

            const resetMemory = React.useCallback(() => {
                const pairs = shuffle(['AI', 'AI', 'ML', 'ML', 'NLP', 'NLP', 'VR', 'VR']);
                setMemoryDeck(pairs.map((label, id) => ({ id, label, revealed: false, matched: false })));
                setOpenCards([]);
                setLockBoard(false);
                setMatches(0);
                setMoves(0);
                setMemoryStatus('اطابق البطاقات المتشابهة لأشهر اختصارات الذكاء الاصطناعي.');
            }, []);

            React.useEffect(() => {
                startReactionRound();
                resetMemory();
            }, [resetMemory]);

            const clickMemoryCard = (id) => {
                if (lockBoard) return;
                const card = memoryDeck.find(c => c.id === id);
                if (!card || card.matched || card.revealed) return;

                const updated = memoryDeck.map(c => c.id === id ? { ...c, revealed: true } : c);
                const opened = [...openCards, id];
                setMemoryDeck(updated);
                setOpenCards(opened);

                if (opened.length === 2) {
                    setMoves(m => m + 1);
                    const [firstId, secondId] = opened;
                    const first = updated.find(c => c.id === firstId);
                    const second = updated.find(c => c.id === secondId);

                    if (first.label === second.label) {
                        setMemoryDeck(prev => prev.map(c => (c.id === firstId || c.id === secondId) ? { ...c, matched: true } : c));
                        setOpenCards([]);
                        const nextMatches = matches + 1;
                        setMatches(nextMatches);
                        setMemoryStatus('رائع! تم العثور على تطابق.');
                        if (nextMatches === 4) {
                            setMemoryStatus('أحسنت! أنهيت لعبة الذاكرة بنجاح.');
                        }
                    } else {
                        setLockBoard(true);
                        setMemoryStatus('ليس تطابقاً، حاول مرة أخرى.');
                        setTimeout(() => {
                            setMemoryDeck(prev => prev.map(c => (c.id === firstId || c.id === secondId) ? { ...c, revealed: false } : c));
                            setOpenCards([]);
                            setLockBoard(false);
                        }, 800);
                    }
                }
            };

            return (
                <div className="container section" style={{ paddingTop: '8rem' }}>
                    <div className="tools-header activities-intro">
                        <span className="badge">تعلم بالممارسة</span>
                        <h1>أنشطة وألعاب تفاعلية</h1>
                        <p>قسم تفاعلي يساعد على تثبيت مفاهيم الذكاء الاصطناعي عبر ألعاب قصيرة وسريعة دون تغيير المحتوى التعليمي الأساسي.</p>
                    </div>

                    <div className="grid-2">
                        <div className="glass-panel activity-card">
                            <h3><i className="fa-solid fa-bolt" style={{ marginLeft: '8px' }}></i> تحدي الاختصار السريع</h3>
                            <p>تدريب سريع للتعرف على اختصارات الذكاء الاصطناعي مثل AI و ML و NLP.</p>
                            <p style={{ marginBottom: '0.7rem' }}><strong>النقاط:</strong> {reactionScore}</p>
                            <div className="activity-actions">
                                <button className="btn btn-primary" onClick={startReactionRound}>ابدأ الجولة</button>
                                {choices.map((item, idx) => (
                                    <button key={`${item}-${idx}`} className="btn btn-outline" onClick={() => chooseReaction(item)}>{item}</button>
                                ))}
                            </div>
                            <p style={{ marginTop: '1rem', marginBottom: 0 }}>{reactionMessage}</p>
                        </div>

                        <div className="glass-panel activity-card">
                            <h3><i className="fa-solid fa-brain" style={{ marginLeft: '8px' }}></i> لعبة ذاكرة المصطلحات</h3>
                            <p>افتح بطاقتين في كل مرة وابحث عن الأزواج المتطابقة للمصطلحات.</p>
                            <p style={{ marginBottom: '0.7rem' }}><strong>الحركات:</strong> {moves} | <strong>التطابقات:</strong> {matches} / 4</p>
                            <div className="activity-actions">
                                <button className="btn btn-primary" onClick={resetMemory}>إعادة اللعبة</button>
                            </div>
                            <div className="memory-grid">
                                {memoryDeck.map(card => (
                                    <button
                                        key={card.id}
                                        className={`memory-card ${(card.revealed || card.matched) ? 'revealed' : ''}`}
                                        onClick={() => clickMemoryCard(card.id)}
                                        disabled={card.matched || lockBoard}
                                    >
                                        {(card.revealed || card.matched) ? card.label : '؟'}
                                    </button>
                                ))}
                            </div>
                            <p style={{ marginTop: '1rem', marginBottom: 0 }}>{memoryStatus}</p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- SMART ASSISTANT CHATBOT START ---
        const Chatbot = ({ tools }) => {
            const [messages, setMessages] = React.useState([
                { sender: 'bot', text: 'أهلاً بك! أنا المساعد الذكي. يمكنك سؤالي عن أي شيء يخص الذكاء الاصطناعي، وسأجيبك بدقة.' }
            ]);
            const [input, setInput] = React.useState('');
            const [isTyping, setIsTyping] = React.useState(false);
            const chatEndRef = React.useRef(null);

            // Auto scroll to bottom
            React.useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            // NLP Engine Logic
            const generateResponse = (userText) => {
                const text = userText.toLowerCase();
                let botResponse = '';

                // Rule 1: Greetings
                if (text.includes('مرحبا') || text.includes('اهلا') || text.includes('أهلا') || text.includes('السلام')) {
                    return 'أهلاً بك! يسعدني جداً التحدث إليك. هل تبحث عن أداة معينة للذكاء الاصطناعي أو تود معرفة المزيد عنه؟';
                }

                // Rule 2: Specific tool search (check if they typed a tool name)
                const foundTool = tools.find(t => text.includes(t.name.toLowerCase()));
                if (foundTool) {
                    return `بالطبع! ${foundTool.name} هي أداة متخصصة في (${foundTool.category}). 
                    وظيفتها الأساسية: ${foundTool.description}
                    للوصول إليها: ${foundTool.url}`;
                }

                // Rule 3: Category intent
                if (text.includes('صورة') || text.includes('صور') || text.includes('تصميم')) {
                    const imgTools = tools.filter(t => t.category.includes('صور')).slice(0, 3);
                    if (imgTools.length) {
                        return 'لدينا العديد من أدوات توليد وتعديل الصور المعجزة! من أبرزها: ' + imgTools.map(t => t.name).join('، ') + '. يمكنك تفحصها بالكامل في قسم الأدوات.';
                    }
                }

                if (text.includes('فيديو') || text.includes('مونتاج')) {
                    const vidTools = tools.filter(t => t.category.includes('فيديو')).slice(0, 2);
                    if (vidTools.length) {
                        return 'أدوات الفيديو المدعمة بالذكاء الاصطناعي قوية جداً. جرب: ' + vidTools.map(t => t.name).join(' و ') + '.';
                    }
                }

                if (text.includes('صوت') || text.includes('موسيقى') || text.includes('تعليق')) {
                    const audioTools = tools.filter(t => t.category.includes('صوت')).slice(0, 2);
                    if (audioTools.length) {
                        return 'في مجال الصوتيات، أنصحك بقوة بالتعرف على: ' + audioTools.map(t => t.name).join(' و ') + '.';
                    }
                }

                if (text.includes('برمج') || text.includes('كود') || text.includes('تطوير')) {
                    return 'للمبرمجين نصيب الأسد! ألقِ نظرة على Hugging Face للاستضافة، و Codeium كبديل لـ GitHub Copilot. متاحة في قسم التطبيقات.';
                }

                if (text.includes('البحث') || text.includes('السؤال')) {
                    return 'محركات البحث الذكية مثل Perplexity و You.com ستلبي احتياجاتك الاستقصائية بدقة عالية موثقة بالمصادر.';
                }

                // Rule 4: Extracting from concepts
                if (text.includes('عيوب') || text.includes('سلبيات') || text.includes('مشاكل')) {
                    return 'من أبرز سلبيات ومشاكل الذكاء الاصطناعي: ' + CONTENT.home.cons.join('، و ') + '. وتُعد الخصوصية تحدياً كبيراً أيضاً.';
                }

                if (text.includes('مميزات') || text.includes('ايجابيات') || text.includes('فوائد')) {
                    return 'من أهم إيجابيات الذكاء الاصطناعي: ' + CONTENT.home.pros.join('، و ') + '.';
                }

                if (text.includes('انواع') || text.includes('أنواع') || text.includes('تصنيف')) {
                    return 'يُقسم الذكاء الاصطناعي إلى ثلاث مراحل: الضيق (ANI) وهو الموجود حالياً، العام (AGI)، والفائق (ASI) وهو أقوى من البشر.';
                }

                if (text.includes('تعليم') || text.includes('تدريس') || text.includes('طالب')) {
                    return 'في مجال التعليم، يفيد الذكاء الاصطناعي كمعلم خصوصي، يُقيّم آلياً، ويُنشئ محتوى ذكي، ويوفر بيئة محاكاة للواقع الافتراضي للتدريب العملي.';
                }

                if (text.includes('شكرا') || text.includes('شكر')) {
                    return 'العفو الدائم! أنا هنا لخدمتك دوماً. لا تتردد في العودة متى ما شئت.';
                }

                // Fallback
                return 'عذراً، لم أستطع الاستدلال على طلبك بدقة. هل يمكنك إرشادي ما إذا كنت تبحث عن "أداة" معينة، أو تريد معرفة "مميزات" أو "أنواع" الذكاء الاصطناعي؟';
            };

            const generateGeminiResponse = async (userText) => {
                const apiKey = getApiKey();
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                const prompt = `أنت مساعد ذكي باللغة العربية حصراً واسمك "المساعد الذكي"، مدمج في منصة تعليمية متخصصة بالذكاء الاصطناعي.
المنصة تحتوي على 50 أداة ذكاء اصطناعي وأقسام تعليمية.
سؤال المستخدم هو: "${userText}"
أجب بشكل دقيق، مفيد، ومباشر باللغة العربية. نسق إجابتك إذا لزم الأمر بدون استخدام Markdown معقد جداً، واستخدم تعابير طبيعية.`;

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    if (!response.ok) throw new Error('API Error');

                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        return data.candidates[0].content.parts[0].text;
                    }
                    return 'عذراً، يبدو أن هناك مشكلة في صياغة الإجابة.';
                } catch (err) {
                    console.error('Gemini API Error:', err);
                    return 'عذراً، أواجه مشكلة في الاتصال بمحرك الذكاء الاصطناعي حالياً. يُرجى محاولة استخدام كلمات مفتاحية بسيطة للنظام المحلي مؤقتاً.';
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userMsg = input.trim();
                setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                setInput('');
                setIsTyping(true);

                const apiKey = getApiKey();

                if (apiKey) {
                    // Use Real Gemini API
                    const reply = await generateGeminiResponse(userMsg);
                    setIsTyping(false);
                    setMessages(prev => [...prev, { sender: 'bot', text: reply }]);
                } else {
                    // Fallback to local NLP rules
                    setTimeout(() => {
                        const reply = generateResponse(userMsg);
                        setIsTyping(false);
                        setMessages(prev => [...prev, { sender: 'bot', text: reply }]);
                    }, 1000 + Math.random() * 1000);
                }
            };

            return (
                <div className="container section" style={{ paddingTop: '8rem' }}>
                    <div className="tools-header">
                        <span className="badge">الذكاء الاصطناعي التفاعلي</span>
                        <h1>المساعد الذكي</h1>
                        <p>تحدث معي بأي لغة وسأرشدك لأفضل أدوات ومفاهيم الذكاء الاصطناعي الموجودة في منصتنا.</p>
                    </div>

                    <div className="chat-container">
                        <div className="chat-messages">
                            {messages.map((msg, i) => (
                                <div key={i} className={`message ${msg.sender}`}>
                                    {msg.sender === 'bot' && (
                                        <div className="message-icon">
                                            <i className="fa-solid fa-robot"></i>
                                        </div>
                                    )}
                                    <div className="message-bubble">
                                        {msg.text.split('\\n').map((line, j) => <div key={j}>{line}</div>)}
                                    </div>
                                    {msg.sender === 'user' && (
                                        <div className="message-icon">
                                            <i className="fa-regular fa-user"></i>
                                        </div>
                                    )}
                                </div>
                            ))}

                            {isTyping && (
                                <div className="message bot">
                                    <div className="message-icon"><i className="fa-solid fa-robot"></i></div>
                                    <div className="message-bubble typing-indicator">
                                        <div className="typing-dot"></div>
                                        <div className="typing-dot"></div>
                                        <div className="typing-dot"></div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <form className="chat-input-container" onSubmit={handleSend}>
                            <textarea
                                className="chat-input"
                                placeholder="اسألني عن ChatGPT أو عن مميزات الذكاء الاصطناعي..."
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => {
                                    if (e.key === 'Enter' && !e.shiftKey) {
                                        e.preventDefault();
                                        handleSend(e);
                                    }
                                }}
                            />
                            <button type="submit" className="send-btn" disabled={!input.trim() || isTyping}>
                                <i className="fa-solid fa-paper-plane" style={{ transform: 'translateX(-2px)' }}></i>
                            </button>
                        </form>
                    </div>
                </div>
            );
        };
        // --- SMART ASSISTANT CHATBOT END ---


        // --- ADMIN COMPONENTS ---

        const Login = ({ setAdmin, setPage }) => {
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'abdo' && password === 'abdo2002') {
                    setAdmin(true);
                    setPage('dashboard');
                } else {
                    setError('بيانات الدخول غير صحيحة.');
                }
            };

            return (
                <div className="container section" style={{ paddingTop: '10rem', display: 'flex', justifyContent: 'center' }}>
                    <div className="glass-panel" style={{ width: '100%', maxWidth: '400px' }}>
                        <div className="text-center" style={{ marginBottom: '2rem' }}>
                            <i className="fa-solid fa-user-shield" style={{ fontSize: '3rem', color: 'var(--primary)', marginBottom: '1rem' }}></i>
                            <h2>تسجيل دخول المسؤول</h2>
                        </div>

                        {error && <div style={{ color: 'var(--danger)', marginBottom: '1rem', textAlign: 'center' }}>{error}</div>}

                        <form onSubmit={handleLogin}>
                            <div className="form-group">
                                <label>اسم المستخدم</label>
                                <input type="text" dir="ltr" className="form-control" value={username} onChange={e => setUsername(e.target.value)} required />
                            </div>
                            <div className="form-group">
                                <label>كلمة المرور</label>
                                <input type="password" dir="ltr" className="form-control" value={password} onChange={e => setPassword(e.target.value)} required />
                            </div>
                            <button type="submit" className="btn btn-primary" style={{ width: '100%', marginTop: '1rem' }}>دخول إلى اللوحة</button>
                        </form>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ tools, setTools, questions, setQuestions, tutorials, setTutorials }) => {
            const [activeTab, setActiveTab] = React.useState('tools'); // 'tools', 'quiz', 'tutorials', 'settings'
            const [mode, setMode] = React.useState('list');

            // Edit forms temporary states
            const [editingTool, setEditingTool] = React.useState(null);
            const [editingQuiz, setEditingQuiz] = React.useState(null);
            const [apiKeyInput, setApiKeyInput] = React.useState(getApiKey());
            const [saveMsg, setSaveMsg] = React.useState('');
            const [tutorialTitle, setTutorialTitle] = React.useState('');
            const [tutorialDesc, setTutorialDesc] = React.useState('');
            const [tutorialFile, setTutorialFile] = React.useState(null);
            const [tutorialMsg, setTutorialMsg] = React.useState('');
            const [tutorialError, setTutorialError] = React.useState('');
            const [isUploadingTutorial, setIsUploadingTutorial] = React.useState(false);
            const tutorialFileInputRef = React.useRef(null);

            // --- Tool Handlers ---
            const saveToolRecord = (e) => {
                e.preventDefault();
                if (mode === 'add_tool') {
                    const newTool = { ...editingTool, id: Date.now() };
                    const newTools = [newTool, ...tools];
                    setTools(newTools);
                    saveTools(newTools);
                } else if (mode === 'edit_tool') {
                    const newTools = tools.map(t => t.id === editingTool.id ? editingTool : t);
                    setTools(newTools);
                    saveTools(newTools);
                }
                setMode('list');
            };

            const deleteTool = (id) => {
                if (window.confirm('هل أنت متأكد من حذف هذه الأداة؟')) {
                    const newTools = tools.filter(t => t.id !== id);
                    setTools(newTools);
                    saveTools(newTools);
                }
            };

            // --- Quiz Handlers ---
            const saveQuizRecord = (e) => {
                e.preventDefault();
                // Assure options are an array
                const opts = typeof editingQuiz.options === 'string' ? editingQuiz.options.split('،').map(s => s.trim()) : editingQuiz.options;
                const rec = { ...editingQuiz, options: opts };

                if (mode === 'add_quiz') {
                    rec.id = Date.now();
                    const newQ = [...questions, rec];
                    setQuestions(newQ);
                    saveQuiz(newQ);
                } else if (mode === 'edit_quiz') {
                    const newQ = questions.map(q => q.id === rec.id ? rec : q);
                    setQuestions(newQ);
                    saveQuiz(newQ);
                }
                setMode('list');
            };

            const deleteQuiz = (id) => {
                if (window.confirm('هل أنت متأكد من حذف هذا السؤال؟')) {
                    const newQ = questions.filter(q => q.id !== id);
                    setQuestions(newQ);
                    saveQuiz(newQ);
                }
            };

            // --- Tutorials Handlers ---
            const handleTutorialUpload = async (e) => {
                e.preventDefault();
                setTutorialMsg('');
                setTutorialError('');

                if (!tutorialTitle.trim()) {
                    setTutorialError('يرجى إدخال عنوان للدرس.');
                    return;
                }
                if (!tutorialFile) {
                    setTutorialError('يرجى اختيار ملف فيديو أو ملف تعليمي.');
                    return;
                }

                setIsUploadingTutorial(true);
                try {
                    const record = await addTutorialFileToDB({
                        title: tutorialTitle.trim(),
                        description: tutorialDesc.trim(),
                        file: tutorialFile
                    });
                    setTutorials(prev => [...prev, record]);
                    setTutorialTitle('');
                    setTutorialDesc('');
                    setTutorialFile(null);
                    if (tutorialFileInputRef.current) {
                        tutorialFileInputRef.current.value = null;
                    }
                    setTutorialMsg('تم رفع الدرس وحفظه بنجاح. سيظهر الآن في صفحة الدروس للطلاب.');
                } catch (err) {
                    console.error('Error uploading tutorial:', err);
                    setTutorialError('حدث خطأ أثناء رفع الملف. يرجى المحاولة مرة أخرى.');
                } finally {
                    setIsUploadingTutorial(false);
                }
            };

            const handleDeleteTutorial = async (id) => {
                if (!window.confirm('هل أنت متأكد من حذف هذا الدرس والملف المرتبط به؟')) return;
                try {
                    await deleteTutorialFromDB(id);
                    setTutorials(prev => prev.filter(t => t.id !== id));
                } catch (err) {
                    console.error('Error deleting tutorial:', err);
                    alert('حدث خطأ أثناء حذف الدرس.');
                }
            };

            // --- Renderers ---
            if (mode === 'add_tool' || mode === 'edit_tool') {
                return (
                    <div className="container section" style={{ paddingTop: '8rem' }}>
                        <div className="glass-panel">
                            <h2>{mode === 'add_tool' ? 'إضافة أداة جديدة' : 'تعديل الأداة'}</h2>
                            <form onSubmit={saveToolRecord} style={{ marginTop: '2rem' }}>
                                <div className="grid-2">
                                    <div className="form-group">
                                        <label>اسم الأداة</label>
                                        <input type="text" className="form-control" dir="ltr" style={{ textAlign: 'left' }} required
                                            value={editingTool?.name || ''}
                                            onChange={e => setEditingTool({ ...editingTool, name: e.target.value })} />
                                    </div>
                                    <div className="form-group">
                                        <label>الرابط (URL)</label>
                                        <input type="url" className="form-control" dir="ltr" style={{ textAlign: 'left' }} required
                                            value={editingTool?.url || ''}
                                            onChange={e => setEditingTool({ ...editingTool, url: e.target.value })} />
                                    </div>
                                </div>
                                <div className="grid-2">
                                    <div className="form-group">
                                        <label>التصنيف</label>
                                        <select className="form-control" required
                                            value={editingTool?.category || ''}
                                            onChange={e => setEditingTool({ ...editingTool, category: e.target.value })}>
                                            <option value="" disabled>اختر تصنيفاً...</option>
                                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>الشعار (Tagline)</label>
                                        <input type="text" className="form-control" required
                                            value={editingTool?.tagline || ''}
                                            onChange={e => setEditingTool({ ...editingTool, tagline: e.target.value })} />
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>الوصف</label>
                                    <textarea className="form-control" required
                                        value={editingTool?.description || ''}
                                        onChange={e => setEditingTool({ ...editingTool, description: e.target.value })}></textarea>
                                </div>
                                <div className="form-group">
                                    <label>الميزات (افصل بينها بفاصلة '،')</label>
                                    <textarea className="form-control" required
                                        value={editingTool?.features || ''}
                                        onChange={e => setEditingTool({ ...editingTool, features: e.target.value })}></textarea>
                                </div>
                                <div className="form-group">
                                    <label>خطوات الاستخدام (كل خطوة في سطر منفصل)</label>
                                    <textarea className="form-control" required
                                        value={editingTool?.steps_to_use || ''}
                                        onChange={e => setEditingTool({ ...editingTool, steps_to_use: e.target.value })}></textarea>
                                </div>
                                <div className="form-group">
                                    <label>دليل الإنتاجية (مثال تطبيقي)</label>
                                    <textarea className="form-control" required
                                        value={editingTool?.production_steps || ''}
                                        onChange={e => setEditingTool({ ...editingTool, production_steps: e.target.value })}></textarea>
                                </div>
                                <div style={{ display: 'flex', gap: '1rem', marginTop: '2rem' }}>
                                    <button type="submit" className="btn btn-primary">حفظ الأداة</button>
                                    <button type="button" className="btn btn-outline" onClick={() => setMode('list')}>إلغاء</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            if (mode === 'add_quiz' || mode === 'edit_quiz') {
                return (
                    <div className="container section" style={{ paddingTop: '8rem' }}>
                        <div className="glass-panel">
                            <h2>{mode === 'add_quiz' ? 'إضافة سؤال جديد' : 'تعديل السؤال'}</h2>
                            <form onSubmit={saveQuizRecord} style={{ marginTop: '2rem' }}>
                                <div className="form-group">
                                    <label>نص السؤال</label>
                                    <input type="text" className="form-control" required
                                        value={editingQuiz?.question || ''}
                                        onChange={e => setEditingQuiz({ ...editingQuiz, question: e.target.value })} />
                                </div>
                                <div className="form-group">
                                    <label>نوع السؤال</label>
                                    <select className="form-control" required
                                        value={editingQuiz?.type || 'mc'}
                                        onChange={e => {
                                            const type = e.target.value;
                                            setEditingQuiz({ ...editingQuiz, type, options: type === 'tf' ? 'صح، خطأ' : editingQuiz?.options });
                                        }}>
                                        <option value="mc">اختيار من متعدد</option>
                                        <option value="tf">صح أو خطأ</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>الخيارات المتاحة (افصل بينها بفاصلة '،')</label>
                                    <input type="text" className="form-control" required
                                        value={typeof editingQuiz?.options === 'object' ? editingQuiz.options.join('، ') : (editingQuiz?.options || '')}
                                        onChange={e => setEditingQuiz({ ...editingQuiz, options: e.target.value })} />
                                </div>
                                <div className="grid-2">
                                    <div className="form-group">
                                        <label>الإجابة الصحيحة (يجب أن تطابق أحد الخيارات تماماً)</label>
                                        <input type="text" className="form-control" required
                                            value={editingQuiz?.answer || ''}
                                            onChange={e => setEditingQuiz({ ...editingQuiz, answer: e.target.value })} />
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>شرح الإجابة (يظهر بعد اختيار المستخدم)</label>
                                    <textarea className="form-control" required
                                        value={editingQuiz?.explanation || ''}
                                        onChange={e => setEditingQuiz({ ...editingQuiz, explanation: e.target.value })}></textarea>
                                </div>
                                <div style={{ display: 'flex', gap: '1rem', marginTop: '2rem' }}>
                                    <button type="submit" className="btn btn-primary">حفظ السؤال</button>
                                    <button type="button" className="btn btn-outline" onClick={() => setMode('list')}>إلغاء</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container section" style={{ paddingTop: '8rem' }}>
                    <div className="tools-header" style={{ textAlign: 'right' }}>
                        <h1>لوحة تحكم المسؤول</h1>
                        <p>أهلاً بك عبدو. يمكنك هنا إدارة محتوى المنصة.</p>
                    </div>

                    <div style={{ display: 'flex', gap: '1rem', marginBottom: '2rem', flexWrap: 'wrap' }}>
                        <button className={`btn ${activeTab === 'tools' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setActiveTab('tools')}>إدارة الأدوات ({tools.length})</button>
                        <button className={`btn ${activeTab === 'quiz' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setActiveTab('quiz')}>إدارة الاختبار ({questions.length})</button>
                        <button className={`btn ${activeTab === 'tutorials' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setActiveTab('tutorials')}>إدارة الدروس والملفات ({tutorials.length})</button>
                        <button className={`btn ${activeTab === 'settings' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setActiveTab('settings')}>الإعدادات (API)</button>
                    </div>

                    <div className="glass-panel">
                        {activeTab === 'tools' && (
                            <>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <h2>قاعدة بيانات الأدوات</h2>
                                    <button className="btn btn-primary" onClick={() => { setEditingTool({}); setMode('add_tool'); }}>إضافة أداة +</button>
                                </div>
                                <div className="admin-table-container">
                                    <table className="admin-table">
                                        <thead>
                                            <tr>
                                                <th>الاسم</th>
                                                <th>التصنيف</th>
                                                <th>الشعار</th>
                                                <th>إجراءات</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {tools.map(t => (
                                                <tr key={t.id}>
                                                    <td dir="ltr" style={{ textAlign: 'right' }}>{t.name}</td>
                                                    <td>{t.category.substring(0, 25)}...</td>
                                                    <td>{t.tagline}</td>
                                                    <td>
                                                        <div className="action-btns">
                                                            <button className="btn btn-outline btn-sm" onClick={() => { setEditingTool(t); setMode('edit_tool'); }}><i className="fa-solid fa-pen"></i></button>
                                                            <button className="btn btn-danger btn-sm" onClick={() => deleteTool(t.id)}><i className="fa-solid fa-trash"></i></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {activeTab === 'quiz' && (
                            <>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <h2>بنك أسئلة الاختبار</h2>
                                    <button className="btn btn-primary" onClick={() => { setEditingQuiz({ type: 'mc', options: '' }); setMode('add_quiz'); }}>إضافة سؤال +</button>
                                </div>
                                <div className="admin-table-container">
                                    <table className="admin-table">
                                        <thead>
                                            <tr>
                                                <th>السؤال</th>
                                                <th>النوع</th>
                                                <th>الإجابة الصحيحة</th>
                                                <th>إجراءات</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {questions.map(q => (
                                                <tr key={q.id}>
                                                    <td>{q.question.substring(0, 50)}...</td>
                                                    <td>{q.type === 'tf' ? 'صح/خطأ' : 'متعدد'}</td>
                                                    <td>{q.answer}</td>
                                                    <td>
                                                        <div className="action-btns">
                                                            <button className="btn btn-outline btn-sm" onClick={() => { setEditingQuiz(q); setMode('edit_quiz'); }}><i className="fa-solid fa-pen"></i></button>
                                                            <button className="btn btn-danger btn-sm" onClick={() => deleteQuiz(q.id)}><i className="fa-solid fa-trash"></i></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {activeTab === 'tutorials' && (
                            <>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem', gap: '1rem', flexWrap: 'wrap' }}>
                                    <div>
                                        <h2>إدارة الدروس والفيديوهات التعليمية</h2>
                                        <p style={{ marginBottom: 0, color: 'var(--text-muted)', fontSize: '0.95rem' }}>
                                            يمكنك هنا رفع فيديوهات تعليمية وملفات (PDF, PPT, DOC...) لتظهر في صفحة "الدروس والملفات" للطلاب.
                                        </p>
                                    </div>
                                </div>

                                <form onSubmit={handleTutorialUpload} style={{ marginBottom: '2rem' }}>
                                    {tutorialMsg && (
                                        <div style={{ marginBottom: '1rem', padding: '0.75rem 1rem', borderRadius: '8px', background: 'rgba(6, 214, 160, 0.1)', color: 'var(--success)' }}>
                                            {tutorialMsg}
                                        </div>
                                    )}
                                    {tutorialError && (
                                        <div style={{ marginBottom: '1rem', padding: '0.75rem 1rem', borderRadius: '8px', background: 'rgba(239, 71, 111, 0.1)', color: 'var(--danger)' }}>
                                            {tutorialError}
                                        </div>
                                    )}
                                    <div className="grid-2">
                                        <div className="form-group">
                                            <label>عنوان الدرس / اسم الملف</label>
                                            <input
                                                type="text"
                                                className="form-control"
                                                value={tutorialTitle}
                                                onChange={e => setTutorialTitle(e.target.value)}
                                                required
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>ملف الفيديو أو الملف التعليمي</label>
                                            <input
                                                type="file"
                                                className="form-control"
                                                ref={tutorialFileInputRef}
                                                onChange={e => setTutorialFile(e.target.files[0] || null)}
                                                accept="video/*,.pdf,.ppt,.pptx,.doc,.docx,.xlsx,.xls,.zip,.rar"
                                                required
                                            />
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label>وصف مختصر (اختياري)</label>
                                        <textarea
                                            className="form-control"
                                            value={tutorialDesc}
                                            onChange={e => setTutorialDesc(e.target.value)}
                                            placeholder="مثال: مقدمة تعريفية عن الذكاء الاصطناعي واستخداماته في التعليم."
                                        ></textarea>
                                    </div>
                                    <button type="submit" className="btn btn-primary" disabled={isUploadingTutorial}>
                                        {isUploadingTutorial ? 'جاري رفع الملف...' : 'رفع الدرس وحفظه'}
                                    </button>
                                </form>

                                <div className="admin-table-container">
                                    <table className="admin-table">
                                        <thead>
                                            <tr>
                                                <th>العنوان</th>
                                                <th>النوع</th>
                                                <th>اسم الملف</th>
                                                <th>الحجم</th>
                                                <th>إجراءات</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {tutorials.length === 0 && (
                                                <tr>
                                                    <td colSpan="5" style={{ textAlign: 'center', color: 'var(--text-muted)' }}>
                                                        لم يتم رفع أي دروس بعد.
                                                    </td>
                                                </tr>
                                            )}
                                            {tutorials.map(t => (
                                                <tr key={t.id}>
                                                    <td>{t.title}</td>
                                                    <td>{t.type === 'video' ? 'فيديو' : 'ملف'}</td>
                                                    <td dir="ltr" style={{ textAlign: 'right' }}>{t.fileName}</td>
