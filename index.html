                                                    <td>{t.size ? `${(t.size / (1024 * 1024)).toFixed(1)} م.ب` : '-'}</td>
                                                    <td>
                                                        <div className="action-btns">
                                                            <button
                                                                type="button"
                                                                className="btn btn-danger btn-sm"
                                                                onClick={() => handleDeleteTutorial(t.id)}
                                                            >
                                                                <i className="fa-solid fa-trash"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {activeTab === 'settings' && (
                            <div style={{ maxWidth: '600px', margin: '0 auto' }}>
                                <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                                    <i className="fa-solid fa-key" style={{ fontSize: '3rem', color: 'var(--accent)', marginBottom: '1rem' }}></i>
                                    <h2>إعدادات محرك الذكاء الاصطناعي والمساعد الذكي</h2>
                                    <p>أدخل مفتاح Google Gemini API لتفعيل قدرات الرد على جميع الأسئلة للمساعد الذكي بطريقة احترافية.</p>
                                </div>

                                {saveMsg && <div style={{ color: 'var(--success)', marginBottom: '1rem', textAlign: 'center', background: 'rgba(6, 214, 160, 0.1)', padding: '0.5rem', borderRadius: '8px' }}>{saveMsg}</div>}

                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    saveApiKey(apiKeyInput);
                                    setSaveMsg('تم حفظ مفتاح API بنجاح! المساعد الذكي مرتبط بالشبكة الآن.');
                                    setTimeout(() => setSaveMsg(''), 4000);
                                }}>
                                    <div className="form-group">
                                        <label>Gemini API Key</label>
                                        <input type="password" dir="ltr" className="form-control"
                                            value={apiKeyInput}
                                            onChange={e => setApiKeyInput(e.target.value)}
                                            placeholder="AIzaSy..." />
                                        <small style={{ color: 'var(--text-muted)', display: 'block', marginTop: '0.5rem' }}>
                                            يمكنك الحصول على مفتاح مجاني من <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{ color: 'var(--primary)' }}>Google AI Studio</a>. يُخزن المفتاح محلياً في متصفحك فقط.
                                        </small>
                                    </div>
                                    <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>حفظ وحماية المفتاح <i className="fa-solid fa-lock" style={{ marginLeft: '8px' }}></i></button>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        };


        // --- MAIN APP ---
        const App = () => {
            const [currentPage, setCurrentPage] = React.useState('home');
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [theme, setTheme] = React.useState('light');

            // Global Content States stored in memory (synced to localStorage / IndexedDB)
            const [tools, setTools] = React.useState([]);
            const [questions, setQuestions] = React.useState([]);
            const [tutorials, setTutorials] = React.useState([]);

            React.useEffect(() => {
                setTools(loadTools());
                setQuestions(loadQuiz());
                getAllTutorialsFromDB().then(setTutorials).catch(() => setTutorials([]));
            }, []);

            React.useEffect(() => {
                const stored = localStorage.getItem('AI_THEME') || 'light';
                setTheme(stored === 'dark' ? 'dark' : 'light');
            }, []);

            React.useEffect(() => {
                if (theme === 'light') {
                    document.body.classList.add('light-mode');
                } else {
                    document.body.classList.remove('light-mode');
                }
                localStorage.setItem('AI_THEME', theme);
            }, [theme]);

            // Scroll to top on page change
            React.useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentPage]);

            // Protect dashboard
            if (currentPage === 'dashboard' && !isAdmin) {
                setCurrentPage('login');
            }

            return (
                <main>
                    <Navbar
                        currentPage={currentPage}
                        setPage={setCurrentPage}
                        isAdmin={isAdmin}
                        setAdmin={setIsAdmin}
                        theme={theme}
                        setTheme={setTheme}
                    />

                    {currentPage === 'home' && <Home />}
                    {currentPage === 'types' && <Types />}
                    {currentPage === 'environments' && <Environments />}
                    {currentPage === 'tools' && <ToolsDirectory tools={tools} />}
                    {currentPage === 'tutorials' && <TutorialsPage tutorials={tutorials} />}
                    {currentPage === 'quiz' && <Quiz questions={questions} />}
                    {currentPage === 'activities' && <Activities />}
                    {currentPage === 'chatbot' && <Chatbot tools={tools} />}

                    {currentPage === 'login' && <Login setAdmin={setIsAdmin} setPage={setCurrentPage} />}
                    {currentPage === 'dashboard' && (
                        <Dashboard
                            tools={tools}
                            setTools={setTools}
                            questions={questions}
                            setQuestions={setQuestions}
                            tutorials={tutorials}
                            setTutorials={setTutorials}
                        />
                    )}

                    <footer>
                        <div className="container">
                            <p>اعداد:عبدالرحمن علي</p>
                        </div>
                    </footer>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
